    async function hashPin(pin) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pin);
      const buf = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");

// ── Image compression ────────────────────────────────────────────────────────
function compressImage(base64Photo, maxWidth = 1024, quality = 0.8) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let { width, height } = img;
      if (width > maxWidth) {
        height = Math.round((height * maxWidth) / width);
        width = maxWidth;
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(base64Photo); // fallback to original
    img.src = base64Photo;
  });
}

// ── AI image analysis call ───────────────────────────────────────────────────
async function analyzeClothingImage(base64Photo) {
  // Compress before sending — phone photos can be 5–10MB
  const compressed = await compressImage(base64Photo);
  const base64Data = compressed.split(",")[1];

  const prompt = `You are a personal stylist analyzing a clothing item photo. Look carefully at the garment and respond ONLY with a valid JSON object — no markdown, no backticks, no explanation, just the raw JSON.

Use ONLY the exact values listed below for each field.

Categories: Top, Blouse, Knit, Button-Down, Cami / Tank, Jeans, Trouser, Skirt, Dress, Shorts, Outerwear, Shoes, Accessory, Bag
Colors: Ivory / Cream, Oat / Linen, White, Dusty Rose / Blush, Sage / Olive, Camel / Tan, Cognac / Brown, Black, Dark Brown, Red, Champagne, Indigo / Dark Wash, Medium Wash, Light Wash, Raw / Ecru Denim, Striped, Other
Fabrics: Linen, Cotton, Silk / Satin, Wool / Knit, Chiffon, Poplin, Denim, Raw Denim, Stretch Denim, Leather, Velvet, Synthetic Blend, Eyelet / Lace, Broderie Anglaise, Other
Occasions: Everyday, Work, Evening, Weekend, Special Occasion, All Occasions
Aesthetic tags: Parisian Archivist, Museum Wanderer, Reading Room, Soft Occasion, Whimsy Detail, Autumn Curator

For jeans specifically: category should be "Jeans", fabric should be "Denim", "Raw Denim", or "Stretch Denim", and color should reflect the wash (e.g. "Indigo / Dark Wash", "Medium Wash", "Light Wash").

JSON structure:
{
  "name": "descriptive name, e.g. 'Indigo Wide-Leg Jeans' or 'Cream Linen Trouser'",
  "category": "exact value from Categories list",
  "color": "exact value from Colors list",
  "fabric": "exact value from Fabrics list",
  "occasions": ["values from Occasions list"],
  "aestheticTags": ["values from Aesthetic tags list"],
  "notes": "one sentence about this piece"
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true",
      "x-api-key": localStorage.getItem("smw_api_key") || "",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          {
            type: "image",
            source: { type: "base64", media_type: "image/jpeg", data: base64Data }
          },
          { type: "text", text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    console.error("API HTTP error:", response.status, errText);
    throw new Error(`API ${response.status}: ${errText.slice(0, 120)}`);
  }

  const data = await response.json();
  console.log("API response:", JSON.stringify(data, null, 2));

  if (data.error) throw new Error(data.error.message || "API returned an error");

  const text = data.content?.map(b => b.text || "").join("") || "";
  console.log("Raw text:", text);

  // Extract JSON block — handles any surrounding text or markdown
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("No JSON in response — please fill in manually.");

  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    throw new Error("Couldn't parse response — please fill in manually.");
  }
}

// ── AI recommendation call ───────────────────────────────────────────────────
async function getOutfitRecommendation(selectedItems, allCloset) {
  const itemDesc = selectedItems.map(i =>
    `${i.name} (${i.category}, ${i.color}${i.wash && i.wash !== "N/A" ? " " + i.wash : ""}, ${i.fabric})`
  ).join(", ");

  const closetDesc = allCloset
    .filter(i => !selectedItems.find(s => s.id === i.id))
    .slice(0, 20)
    .map(i => `${i.name} (${i.category}, ${i.color}${i.wash && i.wash !== "N/A" ? " " + i.wash : ""}, ${i.fabric})`)
    .join(", ");

  const prompt = `You are a personal stylist for someone building a "Soft Museum" aesthetic wardrobe. This aesthetic is: curated, chic, romantic-feminine, quiet luxury, whimsical details, earthy palette (cream, oat, dusty rose, sage, cognac, brown, black).

The person has selected these items for an outfit:
${itemDesc}

Their remaining closet items are:
${closetDesc || "No other items yet"}

Please respond ONLY with a JSON object (no markdown, no preamble) with this exact structure:
{
  "outfitName": "a poetic 3-4 word name for this outfit",
  "formula": "which of the 6 Soft Museum formulas this matches (Parisian Archivist, Museum Wanderer, Reading Room, Soft Occasion, Whimsy Detail Day, Autumn Curator)",
  "assessment": "2-3 sentences assessing the outfit combination, how well it works for the Soft Museum aesthetic",
  "closetSuggestions": [
    {"name": "item name from their closet", "reason": "why it would elevate this outfit"}
  ],
  "missingSuggestions": [
    {"piece": "specific piece type", "description": "exactly what to look for", "why": "how it rounds out the outfit"}
  ],
  "stylingTips": ["tip 1", "tip 2", "tip 3"]
}

Limit closetSuggestions to max 2 items. Limit missingSuggestions to max 2 items. Limit stylingTips to 3.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true",
      "x-api-key": localStorage.getItem("smw_api_key") || "",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await response.json();
  const text = data.content?.map(b => b.text || "").join("") || "{}";
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("No JSON in response");
  return JSON.parse(jsonMatch[0]);
}

  const [analyzed, setAnalyzed] = useState(false);
  const [analyzeError, setAnalyzeError] = useState(null);
  const fileRef = useRef();

  async function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const photoData = ev.target.result;
      setForm(f => ({...f, photo: photoData}));
      setAnalyzing(true);
      setAnalyzed(false);
      setAnalyzeError(null);
      try {
        const result = await analyzeClothingImage(photoData);
        setForm(f => ({
          ...f,
          name: result.name || f.name,
          category: result.category || f.category,
          color: result.color || f.color,
          fabric: result.fabric || f.fabric,

          aestheticTags: result.aestheticTags?.length ? result.aestheticTags : f.aestheticTags,

        setAnalyzed(true);

function OutfitPanel({ selectedItems, allCloset, onClear, onSaveOutfit }) {

  const [error, setError] = useState(null);

  async function analyze() {
    if (selectedItems.length < 2) return;
    setLoading(true); setError(null); setRec(null);
    try {
      const result = await getOutfitRecommendation(selectedItems, allCloset);
      setRec(result);
      setOutfitName(result.outfitName || "");
    } catch(e) { setError("Couldn't analyze — please try again."); }
    finally { setLoading(false); }

  return (
    <div style={{

function SoftMuseumWardrobe() {
  const [data, setData] = useState({ closet:[], wishlist:[], outfits:[] });
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("closet");
  const [showAdd, setShowAdd] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [filterCat, setFilterCat] = useState("All");
  const [searchQ, setSearchQ] = useState("");
  const [savedMsg, setSavedMsg] = useState("");

  useEffect(() => {
    const loadTimeout = setTimeout(() => setLoading(false), 5000);
    fsLoadAll()
      .then(d => { clearTimeout(loadTimeout); setData(d); setLoading(false); })
      .catch(err => { clearTimeout(loadTimeout); console.error("Firestore error:", err); setLoading(false); });
  }, []);

  function addItem(item) {
    const col = item.isWishlist ? "wishlist" : "closet";
    setData(d => ({
      ...d,
      closet:   item.isWishlist ? d.closet   : [...d.closet, item],
      wishlist: item.isWishlist ? [...d.wishlist, item] : d.wishlist,
    }));
    fsAdd(col, item);
  }

  function deleteItem(id, list) {
    setData(d => ({...d, [list]: d[list].filter(i=>i.id!==id)}));
    setSelectedIds(ids => ids.filter(x=>x!==id));
    fsDel(list, id);
  }

  function moveToCloset(item) {
    const updated = {...item, isWishlist:false};
    setData(d => ({
      ...d,
      wishlist: d.wishlist.filter(i=>i.id!==item.id),
      closet: [...d.closet, updated],
    }));
    fsDel("wishlist", item.id);
    fsAdd("closet", updated);
  }

  function toggleSelect(item) {
    setSelectedIds(ids =>
      ids.includes(item.id) ? ids.filter(x=>x!==item.id) : [...ids, item.id]
    );
  }

  function saveOutfit(name, rec) {
    const outfit = {
      id: uid(),
      name: name || "Untitled Outfit",
      items: selectedIds,
      itemNames: data.closet.filter(i=>selectedIds.includes(i.id)).map(i=>i.name),
      formula: rec?.formula,
      assessment: rec?.assessment,
      createdAt: Date.now(),
    };
    setData(d => ({...d, outfits:[...d.outfits, outfit]}));
    fsAdd("outfits", outfit);
    setSavedMsg("Outfit saved!");
    setTimeout(() => setSavedMsg(""), 2500);
  }

  function deleteOutfit(id) {
    setData(d => ({...d, outfits:d.outfits.filter(o=>o.id!==id)}));
    fsDel("outfits", id);
  }

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#FAF7F2",display:"flex",
      alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:28,height:28,borderRadius:"50%",
        border:"2px solid #B8975A",borderTopColor:"transparent",

        Loading your wardrobe…
      </span>
    </div>
  );

  const filtered = allItems.filter(i => {
    const matchCat = filterCat === "All" || i.category === filterCat;

      i.color?.toLowerCase().includes(searchQ.toLowerCase()) ||

    return matchCat && matchQ;
  });

  const selectedItems = data.closet.filter(i => selectedIds.includes(i.id));

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: ${PALETTE.linen}; }
        ::-webkit-scrollbar-thumb { background: ${PALETTE.dustyRose}; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: ${PALETTE.dustyRose} !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
      `}</style>

      {/* Header */}
      <div style={{

            <div style={{

              ) : (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
                  {data.outfits.map(outfit => (
                    <div key={outfit.id} style={{
                      background:PALETTE.warmWhite,
                      border:`1px solid ${PALETTE.linen}`,
                      borderRadius:2,padding:"16px 18px",
                    }}>
                      <div style={{
                        fontFamily:"'Cormorant Garamond',serif",
                        fontSize:18,fontStyle:"italic",color:PALETTE.ink,
                        marginBottom:6,
                      }}>{outfit.name}</div>
                      {outfit.formula && (
                        <div style={{
                          display:"inline-block",marginBottom:10,
                          fontFamily:"'Jost',sans-serif",fontSize:8,
                          letterSpacing:"0.2em",textTransform:"uppercase",
                          color:PALETTE.antiquGold,border:`1px solid ${PALETTE.antiquGold}`,
                          padding:"2px 7px",borderRadius:1,
                        }}>{outfit.formula}</div>
                      )}
                      <div style={{
                        fontFamily:"'Jost',sans-serif",fontSize:11,
                        color:PALETTE.softInk,lineHeight:1.7,marginBottom:10,
                        opacity:0.8,
                      }}>{outfit.itemNames?.join(" · ")}</div>
                      {outfit.assessment && (
                        <div style={{
                          fontFamily:"'Jost',sans-serif",fontSize:11,
                          color:PALETTE.softInk,lineHeight:1.65,
                          borderTop:`1px solid ${PALETTE.linen}`,
                          paddingTop:10,marginBottom:10,
                        }}>{outfit.assessment}</div>
                      )}
                      <button onClick={()=>deleteOutfit(outfit.id)} style={{
                        background:"none",border:"none",cursor:"pointer",
                        fontFamily:"'Jost',sans-serif",fontSize:10,
                        letterSpacing:"0.15em",textTransform:"uppercase",
                        color:PALETTE.dustyRose,padding:0,
                      }}>Remove</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ) : (
            <>
              {/* Filters */}
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
                <input
                  value={searchQ}
                  onChange={e=>setSearchQ(e.target.value)}
                  placeholder="Search your wardrobe…"
                  style={{
                    fontFamily:"'Jost',sans-serif",fontSize:12,
                    color:PALETTE.ink,background:PALETTE.warmWhite,
                    border:`1px solid ${PALETTE.linen}`,borderRadius:2,
                    padding:"7px 12px",outline:"none",width:200,
                  }}
                />
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["All","Top","Blouse","Knit","Bottom","Trouser","Skirt","Dress","Shoes","Bag","Accessory","Outerwear"].map(c=>(
                    <button key={c} onClick={()=>setFilterCat(c)} style={{
                      padding:"5px 10px",borderRadius:2,cursor:"pointer",
                      fontFamily:"'Jost',sans-serif",fontSize:9,
                      letterSpacing:"0.15em",textTransform:"uppercase",
                      background:filterCat===c?PALETTE.ink:"transparent",
                      border:`1px solid ${filterCat===c?PALETTE.ink:PALETTE.linen}`,
                      color:filterCat===c?"white":PALETTE.softInk,
                    }}>{c}</button>
                  ))}
                </div>
              </div>

              {filtered.length === 0 ? (
                <div style={{
                  textAlign:"center",padding:"60px 0",
                  fontFamily:"'Cormorant Garamond',serif",
                  fontSize:18,fontStyle:"italic",
                  color:PALETTE.softInk,opacity:0.4,
                }}>
                  {allItems.length === 0
                    ? `Your ${tab} is empty.\nAdd your first piece.`
                    : "No pieces match your filter."}
                </div>
              ) : (
                <div style={{
                  display:"grid",
                  gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",
                  gap:14,
                }}>
                  {filtered.map(item => (
                    <ClothingCard
                      key={item.id}
                      item={item}
                      selected={selectedIds.includes(item.id)}
                      onSelect={tab==="closet"?toggleSelect:null}
                      onDelete={id=>deleteItem(id, tab==="wishlist"?"wishlist":"closet")}
                      onToggleWishlist={tab==="wishlist"?moveToCloset:undefined}
                      isWishlist={tab==="wishlist"}
                    />
                  ))}
                </div>
              )}
            </>
          )}
        </div>

        {/* Right panel — outfit builder, only on closet tab */}
        {tab !== "outfits" && (
          <div style={{
            borderLeft:`1px solid ${PALETTE.linen}`,
            padding:"24px 20px",
            background:PALETTE.cream,
            minHeight:"calc(100vh - 100px)",
          }}>
            {tab === "closet" ? (
              <OutfitPanel
                selectedItems={selectedItems}
                allCloset={data.closet}
                onClear={()=>setSelectedIds([])}
                onSaveOutfit={saveOutfit}
              />
            ) : (
              <div style={{
                textAlign:"center",padding:"40px 0",
                fontFamily:"'Cormorant Garamond',serif",
                fontSize:15,fontStyle:"italic",
                color:PALETTE.softInk,opacity:0.5,
                lineHeight:1.7,
              }}>Move wishlist items<br/>to your closet to<br/>include them in outfits.</div>
            )}

            {savedMsg && (
              <div style={{
                marginTop:16,textAlign:"center",
                fontFamily:"'Jost',sans-serif",fontSize:11,
                letterSpacing:"0.2em",textTransform:"uppercase",
                color:PALETTE.mutedSage,
              }}>{savedMsg}</div>
            )}
          </div>
        )}
      </div>

      {showAdd && (
        <AddItemModal
          onSave={addItem}
          onClose={()=>setShowAdd(false)}
          defaultWishlist={tab==="wishlist"}
        />
      )}
    </div>
  );

}

// ── API Key Setup ─────────────────────────────────────────────────────────────
function ApiKeySetup({ onDone }) {
  const [key, setKey] = React.useState("");
  const P = {
    warmWhite:"#FAF7F2", cream:"#F5F0E8", dustyRose:"#C4A89A",
    antiquGold:"#B8975A", ink:"#2C2520", softInk:"#4A3F3A", linen:"#E8E0D0",
  };
  function save() {
    if (!key.trim().startsWith("sk-ant-")) return;
    localStorage.setItem("smw_api_key", key.trim());
    onDone();
  }
  return (
    <div style={{minHeight:"100vh",background:P.warmWhite,display:"flex",
      flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28,padding:32}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:9,letterSpacing:"0.4em",
          textTransform:"uppercase",color:P.antiquGold,marginBottom:8}}>One-time setup</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,
          fontWeight:300,color:P.ink}}>AI Analysis Key</div>
        <div style={{fontFamily:"'Jost',sans-serif",fontSize:12,color:P.softInk,
          opacity:0.7,marginTop:10,lineHeight:1.7,maxWidth:340}}>
          Paste your Anthropic API key below. It stays in your browser only — never sent anywhere else.
        </div>
      </div>
      <div style={{width:"100%",maxWidth:380,display:"flex",flexDirection:"column",gap:12}}>
        <input
          type="password"
          placeholder="sk-ant-..."
          value={key}
          onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key === "Enter" && save()}
          style={{
            width:"100%",fontFamily:"'Jost',sans-serif",fontSize:13,
            color:P.ink,background:P.cream,border:`1px solid ${P.linen}`,
            borderRadius:2,padding:"10px 14px",outline:"none",
          }}
        />
        <button onClick={save} style={{
          width:"100%",padding:"11px 0",background:P.dustyRose,border:"none",
          borderRadius:2,fontFamily:"'Jost',sans-serif",fontSize:10,
          letterSpacing:"0.3em",textTransform:"uppercase",color:"white",cursor:"pointer",
        }}>Save & Continue</button>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [unlocked, setUnlocked] = React.useState(!!sessionStorage.getItem("smw_unlocked"));
  const [hasKey, setHasKey] = React.useState(!!localStorage.getItem("smw_api_key"));
  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;
  if (!hasKey) return <ApiKeySetup onDone={() => setHasKey(true)} />;
  return <SoftMuseumWardrobe />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
